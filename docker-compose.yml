services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: nailmuse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nailmuse"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    build: .
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  bot:
    build: .
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: python -m app.bot.bot

volumes:
  postgres_data:
